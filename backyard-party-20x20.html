<script>
(function(){
var TILE=256, cache={};
function gen(type, night){
var _galias={fresh_grass:'grass',dry_grass:'grass',patchy_event_grass:'grass',artificial_turf:'grass',crushed_gravel:'gravel',packed_dirt:'dirt',paver_patio:'concrete',brick_courtyard:'concrete',packed_snow:'concrete',muddy_field:'dirt',crusher_dust:'gravel'};
type=_galias[type]||type;
var key=(type||'grass')+(night?'_n':'_d');
if(cache[key]) return cache[key];
var c=document.createElement('canvas'); c.width=TILE; c.height=TILE;
var g=c.getContext('2d'), S=TILE;
if(type==='gravel'){
g.fillStyle=night?'#2e2e2e':'#7a7a7a'; g.fillRect(0,0,S,S);
for(var i=0;i<4000;i++){var x=Math.random()*S,y=Math.random()*S,r=1+Math.random()*3,sh=night?(40+Math.random()*40):(80+Math.random()*80);
g.fillStyle='rgb('+Math.floor(sh)+','+Math.floor(sh)+','+Math.floor(sh*0.95)+')'; g.globalAlpha=0.7;
g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();}
for(var i=0;i<800;i++){var x=Math.random()*S,y=Math.random()*S,r=2+Math.random()*4,sh=night?(35+Math.random()*50):(90+Math.random()*70);
g.fillStyle='rgb('+Math.floor(sh)+','+Math.floor(sh*0.98)+','+Math.floor(sh*0.93)+')'; g.globalAlpha=0.6;
g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();}
} else if(type==='concrete'){
g.fillStyle=night?'#4a4a4a':'#9a9a9a'; g.fillRect(0,0,S,S);
for(var i=0;i<8000;i++){var x=Math.random()*S,y=Math.random()*S,sh=night?(55+Math.random()*35):(130+Math.random()*50);
g.fillStyle='rgb('+Math.floor(sh)+','+Math.floor(sh)+','+Math.floor(sh)+')'; g.globalAlpha=0.3;
g.fillRect(x,y,1+Math.random()*2,1+Math.random()*2);}
} else if(type==='sand'||type==='original_sand'){
g.fillStyle=night?'#6b5a3a':'#d4bc82'; g.fillRect(0,0,S,S);
for(var i=0;i<10000;i++){var x=Math.random()*S,y=Math.random()*S,rv=Math.random();
if(night) g.fillStyle=rv<0.33?'#5e4f30':rv<0.66?'#7a6840':'#6b5a3a';
else g.fillStyle=rv<0.33?'#c8b070':rv<0.66?'#dcc88e':'#bfa868';
g.globalAlpha=0.5; g.fillRect(x,y,1+Math.random()*2,1+Math.random()*2);}
} else if(type==='dirt'){
g.fillStyle=night?'#2e1f12':'#7a5c3a'; g.fillRect(0,0,S,S);
for(var i=0;i<6000;i++){var x=Math.random()*S,y=Math.random()*S,w=2+Math.random()*4,h=2+Math.random()*4,rv=Math.random();
if(night) g.fillStyle=rv<0.33?'#3a2a18':rv<0.66?'#2a1c0e':'#352416';
else g.fillStyle=rv<0.33?'#8b6b45':rv<0.66?'#6b4e30':'#9a7a50';
g.globalAlpha=0.6; g.fillRect(x,y,w,h);}
} else if(type==='asphalt'){
g.fillStyle=night?'#1a1a1a':'#3e3e3e'; g.fillRect(0,0,S,S);
for(var i=0;i<10000;i++){var x=Math.random()*S,y=Math.random()*S,sh=night?(15+Math.random()*30):(40+Math.random()*40);
g.fillStyle='rgb('+Math.floor(sh)+','+Math.floor(sh)+','+Math.floor(sh)+')'; g.globalAlpha=0.4;
g.fillRect(x,y,1+Math.random()*1.5,1+Math.random()*1.5);}
} else if(type==='parking_lot'){
g.fillStyle=night?'#222222':'#4a4a4a'; g.fillRect(0,0,S,S);
for(var i=0;i<8000;i++){var x=Math.random()*S,y=Math.random()*S,sh=night?(18+Math.random()*28):(45+Math.random()*35);
g.fillStyle='rgb('+Math.floor(sh)+','+Math.floor(sh)+','+Math.floor(sh)+')'; g.globalAlpha=0.35;
g.fillRect(x,y,1+Math.random()*1.5,1+Math.random()*1.5);}
g.globalAlpha=night?0.12:0.15; g.strokeStyle=night?'#555':'#888'; g.lineWidth=2;
g.setLineDash([12,18]); g.beginPath(); g.moveTo(S/2,0); g.lineTo(S/2,S); g.stroke(); g.setLineDash([]);
} else {
g.fillStyle=night?'#0f1009':'#1a1812'; g.fillRect(0,0,S,S);
var pc=Math.round(30000*(S/512)*(S/512));
for(var i=0;i<pc;i++){var x=Math.random()*S,y=Math.random()*S,w=2+Math.random()*4,h=2+Math.random()*4,r=Math.random();
if(night) g.fillStyle=r<0.35?'#151c0b':r<0.65?'#1a2410':'#121807';
else g.fillStyle=r<0.35?'#222b13':r<0.65?'#2d381c':'#1e240f';
g.globalAlpha=0.8; g.fillRect(x,y,w,h);}
var bc=Math.round(12000*(S/512)*(S/512)); g.globalAlpha=0.6;
for(var i=0;i<bc;i++){var x=Math.random()*S,y=Math.random()*S,len=3+Math.random()*6;
var ang=-Math.PI/2+(Math.random()-0.5)*0.9;
if(night) g.strokeStyle=Math.random()<0.5?'#263818':'#2f4420';
else g.strokeStyle=Math.random()<0.5?'#3d5a28':'#4a6b30';
g.lineWidth=0.8+Math.random()*1.0; g.beginPath(); g.moveTo(x,y);
g.lineTo(x+Math.cos(ang)*len,y+Math.sin(ang)*len); g.stroke();}
}
g.globalAlpha=1.0; cache[key]=c.toDataURL('image/png'); return cache[key];
}
window.__groundTile=gen;
window.__grassTile=function(night){ return gen('grass',night); };
})();

* controls so the operator can see at a glance that the live preview
* is in capture-the-camera mode.
*
* Toggled by the parent React app via postMessage:
*   { type: 'tm-cam-edit', enabled: true|false }
* The handler sets document.body.dataset.tmCamEdit accordingly.
* ════════════════════════════════════════════════════════════════ */
body[data-tm-cam-edit="true"] .control-btn {
border-color: #f97316 !important;
box-shadow: 0 0 0 3px rgba(249,115,22,0.45), 0 10px 25px rgba(0,0,0,0.3) !important;
background: rgba(255,237,213,0.95) !important;
}
body[data-tm-cam-edit="true"] .embed-3d-btn-white {
border-color: #f97316 !important;
box-shadow: 0 0 0 3px rgba(249,115,22,0.5), 0 10px 25px rgba(0,0,0,0.3) !important;
background: #fff7ed !important;
}
body[data-tm-cam-edit="true"] .embed-3d-btn-blue {
border-color: #f97316 !important;
box-shadow: 0 0 0 3px rgba(249,115,22,0.7), 0 10px 25px rgba(0,0,0,0.3) !important;
background: #ea580c !important;
}
body[data-tm-cam-edit="true"] #three-container {
box-shadow: inset 0 0 0 4px #f97316;
cursor: grab;
}
body[data-tm-cam-edit="true"] #three-container:active {
cursor: grabbing;
}
body[data-tm-cam-edit="true"] #three-overlay::after {
content: 'EDIT MODE — DRAG TO ROTATE, USE CONTROLS, THEN SAVE';
position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
background: #f97316; color: #fff; font-weight: 900; font-size: 10px;
letter-spacing: 0.18em; padding: 6px 14px; border-radius: 999px;
box-shadow: 0 8px 20px rgba(249,115,22,0.4);
pointer-events: none; z-index: 6500;
white-space: nowrap;
}
@media (max-width: 560px) {
body[data-tm-cam-edit="true"] #three-overlay::after {
font-size: 7px; padding: 4px 10px; letter-spacing: 0.12em;
content: 'EDIT MODE — DRAG TO SET STARTING VIEW';
}
}
/* Multi-layout tab bar */
.ml-tab-bar {
position: relative; top: 0; left: 0; right: 0; z-index: 7000;
display: none; /* shown by JS when MULTI_LAYOUTS.length > 0 */
background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
border-bottom: 1px solid rgba(0,0,0,0.08);
padding: 6px 12px; gap: 6px;
justify-content: center; align-items: center;
flex-shrink: 0;
overflow-x: auto; overflow-y: hidden;
-webkit-overflow-scrolling: touch;
scrollbar-width: none; -ms-overflow-style: none;
flex-wrap: nowrap;
}
.ml-tab-bar::-webkit-scrollbar { display: none; }
.ml-tab-bar.active { display: flex; }
.ml-tab {
padding: 6px 16px; border-radius: 100px; font-weight: 900; font-size: 9px;
text-transform: uppercase; letter-spacing: 1.2px; cursor: pointer;
border: 2px solid rgba(0,0,0,0.12); background: #f8fafc; color: #64748b;
transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
}
.ml-tab:hover { background: #e2e8f0; }
.ml-tab.active { background: #2563eb; color: white; border-color: #1d4ed8; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
@media (max-width: 480px) {
.ml-tab-bar { padding: 4px 8px; gap: 4px; justify-content: flex-start; }
.ml-tab { padding: 5px 12px; font-size: 8px; letter-spacing: 0.8px; }
}
/* Branding logo (top-left) */

max-height: 40px; max-width: 140px; object-fit: contain;
pointer-events: none; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}
@media (max-width: 560px) {
#embed-brand-logo { left: 10px; max-height: 28px; max-width: 100px; }
}
/* Watermark overlay */
#watermark-overlay {
position: fixed; inset: 0; z-index: 200;
display: flex; align-items: center; justify-content: center;
pointer-events: none; overflow: hidden;
}

/* Hosted embed inventory carousel – docked to bottom of iframe */
.on-screen-controls { position:absolute; bottom: 100px; left: 20px; right: 20px; display:flex; justify-content: space-between; align-items: flex-end; pointer-events: none; }
.dpad { display:grid; grid-template-columns: repeat(3, 50px); gap: 5px; pointer-events: auto; }
.control-btn { width: 50px; height: 50px; background: #ffffff; backdrop-filter: blur(5px); border: 2px solid #000000; border-radius: 12px; color: #000000; display:flex; align-items:center; justify-content:center; cursor: pointer; pointer-events: auto; user-select: none; transition: background 0.1s; font-weight: 900; font-size: 14px; }
.control-btn svg { width: 20px; height: 20px; fill: none; stroke: #000000; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.addon-nav-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.control-btn:active { background: #dbeafe; border-color: #2563eb; }
.control-btn.look:active { background: #cffafe; border-color: #0891b2; }

.control-btn.elevation-down:active { background: #dcfce7; border-color: #16a34a; }

@media (max-width: 560px) {

<script>
const ITEM_DEFS = {"round-table-5ft":{"type":"round","diameter":5,"seats":8,"color":"#556B2F","displayName":"5 ft Round","description":"Standard 60-inch circular table. Seats 8 guests comfortably. Best for weddings and gala dinners to facilitate face-to-face conversation."},"tent-item-20x20-marquee":{"type":"structure","width":20,"height":20,"seats":0,"color":"#ffffff","displayName":"20x20 Marquee","tentType":"Marquee","description":"High-peak frame tent. Ideal for small parties or as an entrance foyer to a larger structure."}};
(new Function("// -----------------------------------------------------------------------------\n// Top-Down SVG Registry - Realistic 2D plan-view icons for every inventory item\n// -----------------------------------------------------------------------------\n// Returns an SVG string (or empty string if no custom icon) for a given item.\n// The SVG fills its container via viewBox=\"0 0 100 100\" and preserveAspectRatio.\n// Colors are passed in so linens/overrides still work.\n\n\n\n// -- helpers ------------------------------------------------------------------\nlet _svgIdCounter = 0;\nconst uid = () => `td${++_svgIdCounter}`;\n\nconst esc = (c) => c.replace(/\"/g, '&quot;');\nconst darken = (hex, amt = 30) => {\n  let c = hex.replace('#', '');\n  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];\n  const n = parseInt(c, 16);\n  let r = (n >> 16) - amt; let g = ((n >> 8) & 0xff) - amt; let b = (n & 0xff) - amt;\n  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);\n  return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;\n};\nconst lighten = (hex, amt = 40) => {\n  let c = hex.replace('#', '');\n  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];\n  const n = parseInt(c, 16);\n  let r = (n >> 16) + amt; let g = ((n >> 8) & 0xff) + amt; let b = (n & 0xff) + amt;\n  r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);\n  return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;\n};\n\n// -- Luminance-based contrast text color -------------------------------------\n// Call this to determine whether text on a given background should be white or black.\nfunction getContrastTextColor(hex) {\n  let c = hex.replace('#', '');\n  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];\n  const n = parseInt(c, 16);\n  const r = (n >> 16) & 0xff;\n  const g = (n >> 8) & 0xff;\n  const b = n & 0xff;\n  // Relative luminance (sRGB)\n  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;\n  return lum > 0.55 ? 'black' : 'white';\n}\n\nconst wrap = (inner, vw = 100, vh = 100) =>\n  `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 ${vw} ${vh}\" preserveAspectRatio=\"none\" width=\"100%\" height=\"100%\" style=\"position:absolute;inset:0;pointer-events:none\">${inner}</svg>`;\n\n// -- ROUND TABLES -------------------------------------------------------------\nconst roundTable = (color) => {\n  const d = darken(color, 20);\n  const l = lighten(color, 25);\n  const g = uid();\n  return wrap(`\n    <defs>\n      <radialGradient id=\"${g}\" cx=\"45%\" cy=\"40%\">\n        <stop offset=\"0%\" stop-color=\"${l}\"/>\n        <stop offset=\"60%\" stop-color=\"${esc(color)}\"/>\n        <stop offset=\"100%\" stop-color=\"${d}\"/>\n      </radialGradient>\n    </defs>\n    <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"url(#${g})\" stroke=\"${d}\" stroke-width=\"2.5\"/>\n    <ellipse cx=\"50\" cy=\"50\" rx=\"40\" ry=\"40\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.5\" opacity=\"0.25\"/>\n    <ellipse cx=\"50\" cy=\"50\" rx=\"28\" ry=\"28\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.3\" opacity=\"0.15\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"5\" fill=\"${d}\" opacity=\"0.12\"/>\n    <ellipse cx=\"38\" cy=\"35\" rx=\"10\" ry=\"8\" fill=\"${l}\" opacity=\"0.15\" transform=\"rotate(-20 38 35)\"/>\n  `);\n};\n\n// -- ROUND PLASTIC TABLE ------------------------------------------------------\nconst roundTablePlastic = (color) => {\n  const g = uid();\n  const d = darken(color, 15);\n  return wrap(`\n    <defs>\n      <radialGradient id=\"${g}\" cx=\"48%\" cy=\"42%\">\n        <stop offset=\"0%\" stop-color=\"${lighten(color, 35)}\"/>\n        <stop offset=\"70%\" stop-color=\"${esc(color)}\"/>\n        <stop offset=\"100%\" stop-color=\"${d}\"/>\n      </radialGradient>\n    </defs>\n    <circle cx=\"50\" cy=\"50\" r=\"48\" fill=\"url(#${g})\" stroke=\"${d}\" stroke-width=\"1.5\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"42\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.6\" stroke-dasharray=\"4 3\" opacity=\"0.2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"7\" fill=\"${d}\" opacity=\"0.12\"/>\n    <ellipse cx=\"40\" cy=\"38\" rx=\"8\" ry=\"5\" fill=\"white\" opacity=\"0.12\" transform=\"rotate(-25 40 38)\"/>\n  `);\n};\n\n// -- BANQUET / RECTANGULAR TABLES ---------------------------------------------\nconst rectTable = (color) => {\n  const g = uid();\n  const d = darken(color, 20);\n  const l = lighten(color, 20);\n  return wrap(`\n    <defs>\n      <linearGradient id=\"${g}\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"${l}\"/>\n        <stop offset=\"100%\" stop-color=\"${d}\"/>\n      </linearGradient>\n    </defs>\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"3\" fill=\"url(#${g})\" stroke=\"${d}\" stroke-width=\"2.5\"/>\n    <rect x=\"6\" y=\"6\" width=\"88\" height=\"88\" rx=\"1\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.4\" opacity=\"0.15\"/>\n    <line x1=\"8\" y1=\"50\" x2=\"92\" y2=\"50\" stroke=\"${d}\" stroke-width=\"0.3\" opacity=\"0.12\"/>\n    <rect x=\"10\" y=\"10\" width=\"20\" height=\"12\" rx=\"1\" fill=\"${l}\" opacity=\"0.08\"/>\n  `);\n};\n\n// -- WOOD TABLE (Farm table) --------------------------------------------------\nconst woodTable = (color) => {\n  const g = uid();\n  const d = darken(color, 25);\n  const l = lighten(color, 15);\n  return wrap(`\n    <defs>\n      <linearGradient id=\"${g}\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"${l}\"/>\n        <stop offset=\"50%\" stop-color=\"${esc(color)}\"/>\n        <stop offset=\"100%\" stop-color=\"${d}\"/>\n      </linearGradient>\n    </defs>\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"2\" fill=\"url(#${g})\" stroke=\"${d}\" stroke-width=\"2.5\"/>\n    <line x1=\"2\" y1=\"20\" x2=\"98\" y2=\"20\" stroke=\"${d}\" stroke-width=\"0.7\" opacity=\"0.18\"/>\n    <line x1=\"2\" y1=\"40\" x2=\"98\" y2=\"40\" stroke=\"${d}\" stroke-width=\"0.5\" opacity=\"0.12\"/>\n    <line x1=\"2\" y1=\"60\" x2=\"98\" y2=\"60\" stroke=\"${d}\" stroke-width=\"0.5\" opacity=\"0.12\"/>\n    <line x1=\"2\" y1=\"80\" x2=\"98\" y2=\"80\" stroke=\"${d}\" stroke-width=\"0.7\" opacity=\"0.18\"/>\n    <rect x=\"4\" y=\"4\" width=\"5\" height=\"5\" rx=\"1\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"91\" y=\"4\" width=\"5\" height=\"5\" rx=\"1\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"4\" y=\"91\" width=\"5\" height=\"5\" rx=\"1\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"91\" y=\"91\" width=\"5\" height=\"5\" rx=\"1\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"18\" y=\"18\" width=\"8\" height=\"3\" rx=\"0.5\" fill=\"${d}\" opacity=\"0.06\"/>\n    <rect x=\"55\" y=\"45\" width=\"12\" height=\"3\" rx=\"0.5\" fill=\"${d}\" opacity=\"0.05\"/>\n  `);\n};\n\n// -- HEAD TABLE (one-sided) ---------------------------------------------------\nconst headTable = (color) => {\n  const d = darken(color, 20);\n  const l = lighten(color, 12);\n  return wrap(`\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"3\" fill=\"${esc(color)}\" stroke=\"${d}\" stroke-width=\"2.5\"/>\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"48\" rx=\"3\" fill=\"${darken(color, 8)}\" opacity=\"0.3\"/>\n    <line x1=\"10\" y1=\"50\" x2=\"90\" y2=\"50\" stroke=\"${d}\" stroke-width=\"1.2\" opacity=\"0.25\" stroke-dasharray=\"4 3\"/>\n    <rect x=\"10\" y=\"55\" width=\"80\" height=\"6\" rx=\"1\" fill=\"${l}\" opacity=\"0.08\"/>\n  `);\n};\n\n// -- SKIRTED TABLE ------------------------------------------------------------\nconst skirtedTable = (color) => {\n  const d = darken(color, 15);\n  const l = lighten(color, 10);\n  return wrap(`\n    <rect x=\"1\" y=\"1\" width=\"98\" height=\"98\" rx=\"2\" fill=\"${esc(color)}\" stroke=\"${d}\" stroke-width=\"2\"/>\n    <rect x=\"1\" y=\"86\" width=\"98\" height=\"13\" rx=\"0 0 2 2\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"1\" y=\"1\" width=\"98\" height=\"13\" rx=\"2 2 0 0\" fill=\"${d}\" opacity=\"0.35\"/>\n    <rect x=\"1\" y=\"1\" width=\"13\" height=\"98\" rx=\"2 0 0 2\" fill=\"${d}\" opacity=\"0.2\"/>\n    <rect x=\"86\" y=\"1\" width=\"13\" height=\"98\" rx=\"0 2 2 0\" fill=\"${d}\" opacity=\"0.2\"/>\n    <rect x=\"16\" y=\"16\" width=\"68\" height=\"68\" rx=\"1\" fill=\"${l}\" opacity=\"0.06\"/>\n    <line x1=\"5\" y1=\"88\" x2=\"5\" y2=\"92\" stroke=\"${d}\" stroke-width=\"1\" opacity=\"0.3\"/>\n    <line x1=\"95\" y1=\"88\" x2=\"95\" y2=\"92\" stroke=\"${d}\" stroke-width=\"1\" opacity=\"0.3\"/>\n  `);\n};\n\n// -- COCKTAIL TABLE -----------------------------------------------------------\nconst cocktailTable = (color) => {\n  const d = darken(color, 30);\n  const g = uid();\n  return wrap(`\n    <defs>\n      <radialGradient id=\"${g}\" cx=\"45%\" cy=\"42%\">\n        <stop offset=\"0%\" stop-color=\"${lighten(color, 20)}\"/>\n        <stop offset=\"70%\" stop-color=\"${esc(color)}\"/>\n        <stop offset=\"100%\" stop-color=\"${d}\"/>\n      </radialGradient>\n    </defs>\n    <circle cx=\"50\" cy=\"50\" r=\"47\" fill=\"url(#${g})\" stroke=\"${d}\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"22\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.8\" opacity=\"0.15\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"6\" fill=\"${d}\" opacity=\"0.2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"3\" fill=\"${darken(color, 40)}\" opacity=\"0.15\"/>\n    <ellipse cx=\"42\" cy=\"40\" rx=\"6\" ry=\"4\" fill=\"white\" opacity=\"0.08\" transform=\"rotate(-30 42 40)\"/>\n  `);\n};\n\n// -- COCKTAIL LUMINOUS (LED) --------------------------------------------------\nconst cocktailLuminous = (color) => {\n  const g = uid();\n  return wrap(`\n    <defs>\n      <radialGradient id=\"${g}\" cx=\"50%\" cy=\"50%\">\n        <stop offset=\"0%\" stop-color=\"${lighten(color, 70)}\" stop-opacity=\"0.95\"/>\n        <stop offset=\"40%\" stop-color=\"${lighten(color, 30)}\" stop-opacity=\"0.8\"/>\n        <stop offset=\"100%\" stop-color=\"${darken(color, 30)}\" stop-opacity=\"1\"/>\n      </radialGradient>\n    </defs>\n    <circle cx=\"50\" cy=\"50\" r=\"47\" fill=\"url(#${g})\" stroke=\"${darken(color, 40)}\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"32\" fill=\"none\" stroke=\"white\" stroke-width=\"0.6\" opacity=\"0.25\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"18\" fill=\"none\" stroke=\"white\" stroke-width=\"0.4\" opacity=\"0.15\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"6\" fill=\"white\" opacity=\"0.4\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"3\" fill=\"white\" opacity=\"0.6\"/>\n  `);\n};\n\n// -- WROUGHT IRON COCKTAIL ----------------------------------------------------\nconst cocktailWroughtIron = () => {\n  const g = uid();\n  return wrap(`\n    <defs>\n      <radialGradient id=\"${g}\" cx=\"42%\" cy=\"38%\">\n        <stop offset=\"0%\" stop-color=\"#555\"/>\n        <stop offset=\"100%\" stop-color=\"#1a1a1a\"/>\n      </radialGradient>\n    </defs>\n    <circle cx=\"50\" cy=\"50\" r=\"47\" fill=\"url(#${g})\" stroke=\"#111\" stroke-width=\"2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"36\" fill=\"none\" stroke=\"#666\" stroke-width=\"1.5\"/>\n    <path d=\"M50 14 L50 86\" stroke=\"#555\" stroke-width=\"0.8\" opacity=\"0.3\"/>\n    <path d=\"M14 50 L86 50\" stroke=\"#555\" stroke-width=\"0.8\" opacity=\"0.3\"/>\n    <path d=\"M22 22 L78 78\" stroke=\"#555\" stroke-width=\"0.5\" opacity=\"0.15\"/>\n    <path d=\"M78 22 L22 78\" stroke=\"#555\" stroke-width=\"0.5\" opacity=\"0.15\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"9\" fill=\"#2a2a2a\" stroke=\"#666\" stroke-width=\"1.2\"/>\n    <circle cx=\"50\" cy=\"50\" r=\"3\" fill=\"#444\"/>\n  `);\n};\n\n// -- BAR (barrel style) -------------------------------------------------------\nconst barBarrel = (color, barrels) => {\n  const d = darken(color, 20);\n  const bw = 80 / barrels;\n  let circles = '';\n  for (let i = 0; i < barrels; i++) {\n    const cx = 10 + bw / 2 + i * bw;\n    circles += `<ellipse cx=\"${cx}\" cy=\"50\" rx=\"${bw/2 - 2}\" ry=\"30\" fill=\"${lighten(color, 10)}\" stroke=\"${d}\" stroke-width=\"1.5\"/>`;\n    circles += `<ellipse cx=\"${cx}\" cy=\"50\" rx=\"${bw/2 - 2}\" ry=\"30\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.5\" stroke-dasharray=\"2 2\" opacity=\"0.3\"/>`;\n    circles += `<ellipse cx=\"${cx}\" cy=\"33\" rx=\"${bw/2 - 4}\" ry=\"3.5\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.9\" opacity=\"0.35\"/>`;\n    circles += `<ellipse cx=\"${cx}\" cy=\"67\" rx=\"${bw/2 - 4}\" ry=\"3.5\" fill=\"none\" stroke=\"${d}\" stroke-width=\"0.9\" opacity=\"0.35\"/>`;\n    circles += `<ellipse cx=\"${cx}\" cy=\"50\" rx=\"${bw/4}\" ry=\"8\" fill=\"${lighten(color, 20)}\" opacity=\"0.1\"/>`;\n  }\n  return wrap(`\n    <rect x=\"2\" y=\"10\" width=\"96\" height=\"80\" rx=\"4\" fill=\"${esc(color)}\" stroke=\"${d}\" stroke-width=\"2\"/>\n    ${circles}\n    <rect x=\"2\" y=\"5\" width=\"96\" height=\"10\" rx=\"2\" fill=\"${d}\" opacity=\"0.2\"/>\n  `);\n};\n\n// -- BAR MODERN ---------------------------------------------------------------\nconst barModern = (color) => {\n  const d = darken(color, 20);\n  const l = lighten(color, 15);\n  return wrap(`\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"4\" fill=\"${esc(color)}\" stroke=\"${d}\" stroke-width=\"2\"/>\n    <rect x=\"5\" y=\"5\" width=\"90\" height=\"44\" rx=\"2\" fill=\"${l}\" stroke=\"${d}\" stroke-width=\"0.8\"/>\n    <rect x=\"5\" y=\"53\" width=\"90\" height=\"42\" rx=\"2\" fill=\"${darken(color, 10)}\" stroke=\"${d}\" stroke-width=\"0.8\"/>\n    <line x1=\"50\" y1=\"5\" x2=\"50\" y2=\"49\" stroke=\"${d}\" stroke-width=\"0.6\" opacity=\"0.2\"/>\n    <circle cx=\"25\" cy=\"27\" r=\"4\" fill=\"${d}\" opacity=\"0.08\"/>\n    <circle cx=\"50\" cy=\"27\" r=\"4\" fill=\"${d}\" opacity=\"0.08\"/>\n    <circle cx=\"75\" cy=\"27\" r=\"4\" fill=\"${d}\" opacity=\"0.08\"/>\n    <rect x=\"15\" y=\"60\" width=\"70\" height=\"3\" rx=\"1\" fill=\"${d}\" opacity=\"0.1\"/>\n  `);\n};\n\n// -- BAR TABLE WITH RISER -----------------------------------------------------\nconst barTableRiser = (color, skirtColor) => {\n  const d = darken(color, 20);\n  const l = lighten(color, 15);\n  let skirtSvg = '';\n  if (skirtColor && skirtColor !== 'none') {\n    const sC = skirtColor === 'white' ? '#f0f0f0' : '#1a1a1a';\n    const sD = skirtColor === 'white' ? '#ddd' : '#000';\n    skirtSvg = `\n      <rect x=\"0\" y=\"88\" width=\"100\" height=\"12\" rx=\"0\" fill=\"${sC}\" stroke=\"${sD}\" stroke-width=\"0.8\" opacity=\"0.45\"/>\n      <rect x=\"0\" y=\"2\" width=\"10\" height=\"96\" rx=\"0\" fill=\"${sC}\" stroke=\"${sD}\" stroke-width=\"0.5\" opacity=\"0.3\"/>\n      <rect x=\"90\" y=\"2\" width=\"10\" height=\"96\" rx=\"0\" fill=\"${sC}\" stroke=\"${sD}\" stroke-width=\"0.5\" opacity=\"0.3\"/>\n    `;\n  }\n  return wrap(`\n    ${skirtSvg}\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"3\" fill=\"${esc(color)}\" stroke=\"${d}\" stroke-width=\"2\"/>\n    <rect x=\"5\" y=\"5\" width=\"90\" height=\"44\" rx=\"2\" fill=\"${l}\" stroke=\"${d}\" stroke-width=\"0.8\"/>\n    <rect x=\"8\" y=\"8\" width=\"84\" height=\"10\" rx=\"1\" fill=\"${darken(color, 10)}\" stroke=\"${d}\" stroke-width=\"0.5\" opacity=\"0.4\"/>\n    <rect x=\"5\" y=\"53\" width=\"90\" height=\"42\" rx=\"2\" fill=\"${darken(color, 8)}\" stroke=\"${d}\" stroke-width=\"0.8\"/>\n    <rect x=\"15\" y=\"60\" width=\"70\" height=\"3\" rx=\"1\" fill=\"${d}\" opacity=\"0.08\"/>\n  `);\n};\n\n// -- CEDAR BAR ----------------------------------------------------------------\nconst cedarBar = () => {\n  const g = uid();\n  return wrap(`\n    <defs>\n      <linearGradient id=\"${g}\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n        <stop offset=\"0%\" stop-color=\"#A0704B\"/>\n        <stop offset=\"50%\" stop-color=\"#8B5E3C\"/>\n        <stop offset=\"100%\" stop-color=\"#6B4226\"/>\n      </linearGradient>\n    </defs>\n    <rect x=\"2\" y=\"2\" width=\"96\" height=\"96\" rx=\"3\" fill=\"url(#${g})\" stroke=\"#5C3A1E\" stroke-width=\"2.5\"/>\n    <line x1=\"2\" y1=\"20\" x2=\"98\" y2=\"20\ const WATERMARK_MODE = "none";
const WATERMARK_LOGO_URL = "";
const WATERMARK_TEXT = "";
const WATERMARK_OPACITY = 0.15;
const WATERMARK_ON_SCREENSHOT = true;
const TUTORIAL_FLAG = false;
const seenTips = new Set();
const TIPS = {
'item': 'Drag items to reposition. Click to reveal linens, rotation, and duplication tools.',
'rotate': 'Click the rotate handle to rotate selected items by 15 degrees.',
'linen': 'Click the palette icon to change tablecloth colors.',
'duplicate': 'Clone selection to quickly fill the space.',
'delete': 'Permanently remove selected items.',
'3d': 'Switch to 3D mode to walk through your event space in first-person.',
'walls': 'Click = window, Shift+click = solid, Ctrl+click = clear sidewalls.',
'tally': 'The tally panel updates in real-time as you modify the layout.',
'tape': 'Click twice to measure distance in feet.'
};
let historyStack = [];
let redoStack = [];
function pushHistory() {
historyStack.push(JSON.stringify({
items: STATE.items,
sidewalls: STATE.tent?.sidewalls || []
}));
if (historyStack.length > 50) historyStack.shift();
redoStack = [];
}
function undo() {
if (!historyStack.length) return;
redoStack.push(JSON.stringify({
items: STATE.items,
sidewalls: STATE.tent?.sidewalls || []
}));
const prev = JSON.parse(historyStack.pop());
STATE.items = prev.items;
if(STATE.tent) STATE.tent.sidewalls = prev.sidewalls;
render2D();
}
function redo() {
if (!redoStack.length) return;
historyStack.push(JSON.stringify({
items: STATE.items,
sidewalls: STATE.tent?.sidewalls || []
}));
const next = JSON.parse(redoStack.pop());
STATE.items = next.items;
if(STATE.tent) STATE.tent.sidewalls = next.sidewalls;
render2D();
}
function showTip(key) {
if (!STATE.tutorialActive || seenTips.has(key) || !TIPS[key]) return;
const tipEl = document.getElementById('tutorial-tip');
tipEl.innerText = TIPS[key];
tipEl.classList.add('active');
seenTips.add(key);
setTimeout(() => tipEl.classList.remove('active'), 5000);
}
function toggleTutorial() {
STATE.tutorialActive = !STATE.tutorialActive;
const btn = document.getElementById('tutorial-mode-btn');
btn.innerText = 'Help Mode: ' + (STATE.tutorialActive ? 'ON' : 'OFF');
btn.classList.toggle('on', STATE.tutorialActive);
if (!STATE.tutorialActive) document.getElementById('tutorial-tip').classList.remove('active');
}
function toggleTapeMeasure() {
STATE.isTapeActive = !STATE.isTapeActive;
const btn = document.getElementById('btn-tape-measure');
btn.classList.toggle('active', STATE.isTapeActive);
STATE.tapePoints = { start: null, end: null };
if (STATE.isTapeActive) {
STATE.selectedIds = [];
showTip('tape');
}
render2D();
}
function hasTentLightingItems() {
return STATE.items.some(function(i) { return !!i.tentLightingFor; });
}
function updateTentLightingBtn() {
var btn = document.getElementById('btn-tent-lighting');
if (!btn) return;
btn.style.display = hasTentLightingItems() ? 'flex' : 'none';
btn.classList.toggle('active', STATE.showTentLighting);
}
function toggleTentLighting() {
STATE.showTentLighting = !STATE.showTentLighting;
updateTentLightingBtn();
render2D();
}
function toggleNightMode() {
if (MODE !== 'outside') return;
STATE.isNightMode = !STATE.isNightMode;
updateNightModeUI();
if (STATE.view === '3d') {
init3D(true);
} else {
render2D();
}
}
